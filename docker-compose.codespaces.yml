version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: flexiread-db
    environment:
      POSTGRES_USER: ${DB_USER:-flexiread}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flexiread_dev_password}
      POSTGRES_DB: ${DB_NAME:-flexiread}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexiread"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flexiread-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-flexiread_redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: flexiread-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/minio/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: flexiread-minio-init
    volumes:
      - ./backend/scripts/minio-init.sh:/usr/local/bin/minio-init.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/minio-init.sh"]
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-flexiread-dev}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - flexiread-network
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: flexiread-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-flexiread}:${DB_PASSWORD:-flexiread_dev_password}@db:5432/${DB_NAME:-flexiread}
      REDIS_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-flexiread-dev}
      AWS_S3_INTERNAL_ENDPOINT_URL: http://minio:9000
      APP_ENV: codespaces
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - flexiread-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: flexiread-worker
    environment:
      DATABASE_URL: postgresql://${DB_USER:-flexiread}:${DB_PASSWORD:-flexiread_dev_password}@db:5432/${DB_NAME:-flexiread}
      REDIS_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-flexiread-dev}
      AWS_S3_INTERNAL_ENDPOINT_URL: http://minio:9000
    volumes:
      - .:/app
    networks:
      - flexiread-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: flexiread-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - flexiread-network
    depends_on:
      - api
    restart: unless-stopped

networks:
  flexiread-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
