version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: flexiread-db
    environment:
      POSTGRES_USER: flexiread
      POSTGRES_PASSWORD: flexiread_dev_password
      POSTGRES_DB: flexiread
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexiread"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flexiread-redis
    command: redis-server --appendonly yes --requirepass flexiread_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a flexiread_redis_dev ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: flexiread-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: flexiread-minio-init
    volumes:
      - ./backend/scripts/minio-init.sh:/usr/local/bin/minio-init.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/minio-init.sh"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      AWS_S3_BUCKET: flexiread-dev
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - flexiread-network
    restart: "no"

  # =========================================================================
  # FIX #1: API servisine CODESPACES environment variable'lari eklendi
  # =========================================================================
  # ESKI: Backend Codespaces ortaminda oldugunu anlayamiyordu
  # YENI: CODESPACES=true ve CODESPACE_NAME verildi
  # Bu sayede PUBLIC_API_URL, PUBLIC_FRONTEND_URL, ALLOWED_ORIGINS
  # otomatik olarak Codespaces URL'lerine ayarlaniyor
  # =========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: flexiread-api
    environment:
      DATABASE_URL: postgresql://flexiread:flexiread_dev_password@db:5432/flexiread
      REDIS_URL: redis://:flexiread_redis_dev@redis:6379/0
      CELERY_BROKER_URL: redis://:flexiread_redis_dev@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:flexiread_redis_dev@redis:6379/1
      JWT_SECRET_KEY: dev-secret-key-change-in-production-min-32-chars-long
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: flexiread-dev
      AWS_S3_REGION: us-east-1
      AWS_S3_INTERNAL_ENDPOINT_URL: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      APP_NAME: FlexiRead
      APP_ENV: development
      DEBUG: "True"
      LOG_LEVEL: DEBUG
      ALLOWED_ORIGINS: "*"
      TESSERACT_CMD: /usr/bin/tesseract
      OCR_LANGUAGE: tur,eng
      # YENI: Codespaces ortamini algilama icin gerekli
      CODESPACES: "true"
      CODESPACE_NAME: "${CODESPACE_NAME}"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - flexiread-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: flexiread-worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=1
    environment:
      DATABASE_URL: postgresql://flexiread:flexiread_dev_password@db:5432/flexiread
      REDIS_URL: redis://:flexiread_redis_dev@redis:6379/0
      CELERY_BROKER_URL: redis://:flexiread_redis_dev@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:flexiread_redis_dev@redis:6379/1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: flexiread-dev
      AWS_S3_REGION: us-east-1
      AWS_S3_INTERNAL_ENDPOINT_URL: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      APP_NAME: FlexiRead
      APP_ENV: development
      DEBUG: "True"
      LOG_LEVEL: DEBUG
      TESSERACT_CMD: /usr/bin/tesseract
      OCR_LANGUAGE: tur,eng
    volumes:
      - .:/app
    networks:
      - flexiread-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # =========================================================================
  # FIX #2: Frontend servisine VITE_API_URL environment variable'i eklendi
  # =========================================================================
  # ESKI: Frontend API'nin nerede oldugunu bilmiyordu, localhost:8000'e
  #       fallback ediyordu ama Codespaces'te API farkli URL'de calisiyor
  # YENI: VITE_API_URL ile API'nin Codespaces public URL'si verildi
  #       Bu sayede frontend dogru API adresine istek atiyor
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: flexiread-frontend
    environment:
      # YENI: API'nin Codespaces public URL'si
      # ${CODESPACE_NAME} GitHub Codespaces tarafindan otomatik verilir
      # TIRNAK ICINDE: URL'deki tire isareti YAML parser'ini kandiriyordu
      VITE_API_URL: "https://${CODESPACE_NAME}-8000.github.dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - flexiread-network
    depends_on:
      - api
    restart: unless-stopped

networks:
  flexiread-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
