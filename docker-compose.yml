services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: flexiread-db
    environment:
      POSTGRES_USER: ${DB_USER:-flexiread}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flexiread_dev_password}
      POSTGRES_DB: ${DB_NAME:-flexiread}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flexiread}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: flexiread-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-flexiread_redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a ${REDIS_PASSWORD:-flexiread_redis_dev} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: flexiread-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - flexiread-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO Initialization
  minio-init:
    image: minio/mc:latest
    container_name: flexiread-minio-init
    volumes:
      - ./backend/scripts/minio-init.sh:/usr/local/bin/minio-init.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/minio-init.sh"]
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-flexiread-dev}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - flexiread-network
    restart: "no"

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: flexiread-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-flexiread}:${DB_PASSWORD:-flexiread_dev_password}@db:5432/${DB_NAME:-flexiread}
      REDIS_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_HOURS: 24
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-flexiread-dev}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_INTERNAL_ENDPOINT_URL: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      APP_NAME: FlexiRead
      APP_ENV: production
      DEBUG: "False"
      LOG_LEVEL: INFO
      ALLOWED_ORIGINS: http://localhost,http://localhost:5173
      TESSERACT_CMD: /usr/bin/tesseract
      OCR_LANGUAGE: tur,eng
    ports:
      - "8000:8000"
    networks:
      - flexiread-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: flexiread-worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=1
    environment:
      DATABASE_URL: postgresql://${DB_USER:-flexiread}:${DB_PASSWORD:-flexiread_dev_password}@db:5432/${DB_NAME:-flexiread}
      REDIS_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-flexiread_redis_dev}@redis:6379/1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-flexiread-dev}
      AWS_S3_REGION: ${AWS_S3_REGION:-us-east-1}
      AWS_S3_INTERNAL_ENDPOINT_URL: http://minio:9000
      AWS_S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      APP_NAME: FlexiRead
      APP_ENV: production
      DEBUG: "False"
      LOG_LEVEL: INFO
      TESSERACT_CMD: /usr/bin/tesseract
      OCR_LANGUAGE: tur,eng
    networks:
      - flexiread-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # React Frontend (Production with Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: flexiread-frontend
    ports:
      - "80:80"
    networks:
      - flexiread-network
    depends_on:
      - api
    restart: unless-stopped

networks:
  flexiread-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
